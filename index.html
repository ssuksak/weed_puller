<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="도시에서 시골로 온 초보 농부의 잡초 뽑기 매치 퍼즐 게임">
  <meta name="theme-color" content="#4A7C59">
  <title>뽑아라! 잡초 🌿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --farm-green: #4A7C59;
      --farm-green-light: #6B9E7A;
      --farm-brown: #8B6914;
      --farm-red: #C4453A;
      --farm-yellow: #E8A735;
      --farm-cream: #FFF8ED;
      --farm-white: #FFFFFF;
      --farm-black: #2C2416;
      --farm-gray50: #F7F3ED;
      --farm-gray100: #E8E0D4;
      --farm-gray300: #B5A999;
      --farm-gray500: #8A7E6E;
      --farm-gray700: #5C5244;
      --farm-gray900: #2C2416;
      --radius: 12px;
    }

    body {
      background: #FFFDF5;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      font-family: 'Jua', 'Toss Product Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    /* === Start Screen Farm Theme === */
    #start-screen {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #FFFDF5;
      background-image:
        /* 하늘 위쪽 그라데이션 */
        linear-gradient(180deg, #E8F4EC 0%, #FFFDF5 18%, #FFFDF5 65%, transparent 65%),
        /* 잔디 언덕 */
        radial-gradient(ellipse 120% 80px at 30% 100%, #7CB587 0%, transparent 70%),
        radial-gradient(ellipse 140% 60px at 75% 100%, #6BA876 0%, transparent 65%),
        /* 흙 바닥 */
        linear-gradient(0deg, #C4A265 0%, #D4B87A 3%, #E0CFA0 5%, transparent 8%);
      position: relative;
    }
    #start-screen::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 90px;
      background:
        /* 풀숲 텍스처 */
        radial-gradient(ellipse 18px 22px at 10% 90%, #5A9B6A 0%, transparent 70%),
        radial-gradient(ellipse 14px 20px at 22% 85%, #6BAF7C 0%, transparent 70%),
        radial-gradient(ellipse 20px 18px at 45% 92%, #5A9B6A 0%, transparent 70%),
        radial-gradient(ellipse 16px 24px at 60% 87%, #78B888 0%, transparent 65%),
        radial-gradient(ellipse 22px 20px at 80% 90%, #6BAF7C 0%, transparent 70%),
        radial-gradient(ellipse 12px 18px at 92% 86%, #5A9B6A 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    /* 떠다니는 잎사귀 장식 */
    #start-screen::after {
      content: '🍃';
      position: absolute;
      top: 60px; right: 24px;
      font-size: 22px;
      opacity: 0.5;
      animation: leafFloat 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes leafFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-6px) rotate(8deg); }
      75% { transform: translateY(4px) rotate(-5deg); }
    }

    .start-title-area {
      position: relative;
      z-index: 1;
      margin-bottom: 6px;
      margin-top: 12px;
      text-align: left;
      padding-left: 8%;
      width: 100%;
    }
    .start-title-main {
      font-size: 32px;
      font-weight: 900;
      color: var(--farm-green);
      transform: rotate(-2deg);
      display: inline-block;
      text-shadow: 2px 2px 0 #D4E8D9;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    .start-title-main .accent {
      color: var(--farm-red);
      font-size: 36px;
    }
    .start-title-sub {
      font-size: 13px;
      color: var(--farm-gray500);
      margin-top: 4px;
      padding-left: 4px;
      letter-spacing: 0.5px;
    }
    .start-title-weed {
      display: inline-block;
      font-size: 28px;
      margin-left: 6px;
      animation: weedWiggle 1.8s ease-in-out infinite;
      transform-origin: bottom center;
    }
    @keyframes weedWiggle {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(12deg); }
      40% { transform: rotate(-8deg); }
      60% { transform: rotate(5deg); }
      80% { transform: rotate(-3deg); }
    }

    /* 시작 버튼 강화 */
    #start-screen .btn-primary {
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg, #5A9B6A 0%, #4A7C59 100%);
      font-size: 21px;
      padding: 16px 0;
      border-radius: 14px;
      box-shadow:
        0 4px 0 #3A6349,
        0 6px 12px rgba(74,124,89,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
      border: 2px solid #6BAF7C;
    }
    #start-screen .btn-primary:active {
      transform: translateY(3px) scale(0.98);
      box-shadow:
        0 1px 0 #3A6349,
        0 2px 4px rgba(74,124,89,0.2);
    }
    #start-screen .btn-primary:hover {
      background: linear-gradient(180deg, #6BAF7C 0%, #5A9B6A 100%);
    }

    /* 플레이 방법 카드 개선 */
    #start-screen .how-to-play {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #FFFDF5 0%, #F5EDD6 100%);
      border: 1.5px dashed var(--farm-green-light);
      border-radius: 16px;
    }
    #start-screen .how-to-play-title {
      color: var(--farm-brown);
    }
    #start-screen .how-to-row {
      padding: 6px 0;
    }
    #start-screen .how-to-row:not(:last-child) {
      border-bottom: 1px dashed var(--farm-gray100);
    }

    /* 랭킹 카드 z-index */
    #start-ranking {
      position: relative;
      z-index: 1;
    }

    canvas { display: block; position: relative; z-index: 1; }

    /* --- HUD --- */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    .hud-box {
      background: rgba(255,248,237,0.92);
      border-radius: 12px;
      padding: 8px 16px;
      color: var(--farm-black);
      font-weight: 700;
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 6px rgba(44,36,22,0.12);
      border: 1px solid var(--farm-gray100);
    }
    #hud-score { font-size: 20px; }
    #hud-timer { color: var(--farm-brown); }
    #hud-combo {
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 900;
      color: var(--farm-yellow);
      text-shadow: 0 1px 3px rgba(44,36,22,0.4);
      background: rgba(44,36,22,0.7);
      padding: 6px 20px;
      border-radius: 12px;
      opacity: 0;
      transition: all 0.2s;
    }
    #hud-combo.show {
      opacity: 1;
      animation: comboPop 0.3s ease-out;
    }
    #hud-level {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,248,237,0.9);
      background: rgba(44,36,22,0.6);
      padding: 6px 16px;
      border-radius: 10px;
      pointer-events: none;
    }
    @keyframes comboPop {
      0% { transform: translateX(-50%) scale(1.5); }
      100% { transform: translateX(-50%) scale(1); }
    }

    /* --- Screens --- */
    .screen-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
      transition: opacity 0.3s;
    }

    .game-title {
      font-size: 64px;
      margin-bottom: 4px;
      animation: titleBounce 2.5s ease-in-out infinite;
    }
    @keyframes titleBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .game-title-text {
      font-size: 28px;
      font-weight: 900;
      color: var(--farm-black);
      margin-bottom: 16px;
      letter-spacing: 0;
    }
    /* 플레이 방법 카드 */
    .how-to-play {
      background: var(--farm-cream);
      border: 1.5px solid var(--farm-green-light);
      border-radius: 14px;
      padding: 16px 20px;
      width: min(320px, 85%);
      margin-bottom: 16px;
    }
    .how-to-play-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--farm-green);
      margin-bottom: 12px;
    }
    .how-to-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }
    .how-to-row:not(:last-child) {
      border-bottom: 1px solid var(--farm-gray100);
    }
    .how-to-icon {
      font-size: 24px;
      width: 36px;
      text-align: center;
      flex-shrink: 0;
    }
    .how-to-text {
      font-size: 13px;
      color: var(--farm-gray700);
      line-height: 1.4;
    }
    .how-to-text strong {
      color: var(--farm-black);
    }

    .btn-primary {
      background: var(--farm-green);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 18px 64px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.1s, background 0.1s;
      letter-spacing: 0;
      box-shadow: 0 2px 8px rgba(74,124,89,0.2);
    }
    .btn-primary:active {
      transform: scale(0.96);
      background: #3A6349;
      box-shadow: 0 1px 4px rgba(74,124,89,0.2);
    }

    /* Result screen */
    #result-screen {
      background: rgba(44,36,22,0.65);
    }
    .result-card {
      background: var(--farm-white);
      border-radius: 16px;
      padding: 36px 32px;
      text-align: center;
      width: min(85%, 340px);
      box-shadow: 0 8px 24px rgba(44,36,22,0.18);
    }
    .result-emoji { font-size: 64px; margin-bottom: 8px; }
    .result-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--farm-black);
      margin-bottom: 24px;
      letter-spacing: 0;
    }
    .result-score {
      font-size: 60px;
      font-weight: 900;
      color: var(--farm-green);
      margin-bottom: 4px;
      letter-spacing: 0;
    }
    .result-label {
      font-size: 14px;
      color: var(--farm-gray500);
      margin-bottom: 20px;
    }
    .result-stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 28px;
      padding: 16px 0;
      background: var(--farm-cream);
      border-radius: 10px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 900;
      color: var(--farm-black);
    }
    .stat-label {
      font-size: 12px;
      color: var(--farm-gray500);
      margin-top: 4px;
    }
    .btn-retry {
      background: var(--farm-green);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 0;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      pointer-events: auto;
      width: 100%;
      margin-top: 4px;
      transition: transform 0.1s;
      letter-spacing: 0;
      box-shadow: 0 2px 6px rgba(74,124,89,0.18);
    }
    .btn-retry:active { transform: scale(0.97); box-shadow: 0 1px 3px rgba(74,124,89,0.15); }

    /* Feedback */
    .feedback-pop {
      position: absolute;
      pointer-events: none;
      z-index: 15;
      font-weight: 900;
      animation: feedbackUp 0.6s ease-out forwards;
    }
    @keyframes feedbackUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      50% { opacity: 1; transform: translateY(-40px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-70px) scale(0.8); }
    }

    /* Screen shake */
    .shake { animation: shakeAnim 0.15s ease-out; }
    @keyframes shakeAnim {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .hidden { display: none !important; }

    /* Countdown */
    #countdown {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 96px;
      font-weight: 900;
      color: white;
      text-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 25;
      animation: countPop 0.5s ease-out;
    }
    @keyframes countPop {
      0% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* Fever mode glow */
    #fever-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.3s;
      box-shadow: inset 0 0 60px rgba(232,167,53,0.35);
    }
    #fever-overlay.active { opacity: 1; }

    #start-ranking {
      margin-top: 16px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #F0F7F2 0%, #FFF8ED 100%);
      border: 2px solid var(--farm-green-light);
      border-radius: 16px;
      padding: 0;
      width: min(320px, 85%);
      pointer-events: auto;
      box-shadow: 0 4px 16px rgba(74,124,89,0.15), 0 1px 3px rgba(74,124,89,0.08);
      overflow: hidden;
    }
    .ranking-header {
      background: var(--farm-green);
      color: #FFF;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ranking-header .ranking-badge {
      font-size: 22px;
    }
    .ranking-body {
      padding: 6px 12px 8px;
      max-height: 30vh;
      overflow-y: auto;
      pointer-events: auto;
    }
    .ranking-body::-webkit-scrollbar {
      width: 4px;
    }
    .ranking-body::-webkit-scrollbar-thumb {
      background: var(--farm-gray300);
      border-radius: 4px;
    }
    .rank-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 3px;
      transition: background 0.15s;
    }
    .rank-row:last-child { margin-bottom: 0; }
    .rank-row.rank-gold {
      background: #FFF8E1;
      border: 1.5px solid #FFD54F;
      font-size: 15px;
      font-weight: 800;
      padding: 10px 12px;
    }
    .rank-row.rank-silver {
      background: #F5F5F5;
      border: 1.5px solid #BDBDBD;
      font-size: 15px;
      font-weight: 800;
      padding: 10px 12px;
    }
    .rank-row.rank-bronze {
      background: #FBE9E7;
      border: 1.5px solid #FFAB91;
      font-size: 15px;
      font-weight: 800;
      padding: 10px 12px;
    }
    .rank-row.rank-normal {
      font-size: 13px;
      font-weight: 500;
      padding: 6px 10px;
    }
    .rank-row.rank-normal:not(:last-child) {
      border-bottom: 1px solid var(--farm-gray100);
      border-radius: 0;
      margin-bottom: 0;
    }
    .rank-row.rank-me {
      background: #E8F5E9 !important;
      border: 2px solid var(--farm-green) !important;
      box-shadow: 0 0 0 2px rgba(74,124,89,0.15);
    }
    .rank-name {
      color: var(--farm-black);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rank-num {
      color: var(--farm-gray500);
      font-size: 12px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .rank-score {
      color: var(--farm-green);
      font-weight: 700;
      white-space: nowrap;
    }
    .ranking-empty {
      text-align: center;
      padding: 28px 16px;
      color: var(--farm-gray500);
      font-size: 14px;
      line-height: 1.6;
    }
    .ranking-empty .empty-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }
    .btn-primary {
      width: min(320px, 85%);
      padding: 16px 0;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <canvas id="game" style="display:none"></canvas>
  <div id="fever-overlay"></div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-box">⏱ <span id="hud-timer">30s</span></div>
    <div class="hud-box">⭐ <span id="hud-score">0</span></div>
  </div>
  <div id="hud-combo" class="hidden"></div>
  <div id="hud-level" class="hidden"></div>

  <!-- Start Screen -->
  <div id="start-screen" class="screen-overlay" style="padding-top:16px;padding-bottom:calc(20px + env(safe-area-inset-bottom, 20px));justify-content:flex-start">
    <!-- 사운드 버튼: 우측 상단 -->
    <button id="btn-sound" style="position:absolute;top:10px;right:10px;background:rgba(255,253,245,0.85);border:1px solid var(--farm-gray100);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--farm-gray500);cursor:pointer;pointer-events:auto;font-family:Jua,sans-serif;z-index:21">🔊 ON</button>

    <div class="start-title-area">
      <div>
        <span class="start-title-main"><span class="accent">뽑</span>아라! 잡초</span>
        <span class="start-title-weed">🌱</span>
      </div>
      <div class="start-title-sub">🧑‍🌾 도시농부의 잡초 대작전!</div>
    </div>

    <button class="btn-primary" id="btn-start" style="margin-bottom:12px;width:min(320px,90%)">🌿 잡초 뽑으러 가기!</button>

    <div class="how-to-play" style="padding:12px 16px;margin-bottom:8px;width:min(320px,90%)">
      <div class="how-to-play-title" style="margin-bottom:8px;font-size:12px">🧤 플레이 방법</div>
      <div class="how-to-row" style="padding:6px 0">
        <div class="how-to-icon" style="font-size:20px;width:30px">👆</div>
        <div class="how-to-text" style="font-size:12px"><strong>같은 잡초 3개+</strong> 쓱~ 그어서 뽑기!</div>
      </div>
      <div class="how-to-row" style="padding:6px 0">
        <div class="how-to-icon" style="font-size:20px;width:30px">🧨</div>
        <div class="how-to-text" style="font-size:12px"><strong>폭탄잡초</strong> → 빠르게 3번 연타!</div>
      </div>
      <div class="how-to-row" style="padding:6px 0">
        <div class="how-to-icon" style="font-size:20px;width:30px">⏱</div>
        <div class="how-to-text" style="font-size:12px"><strong>30초!</strong> 많이 그을수록 시간 보너스!</div>
      </div>
    </div>

    <div id="start-ranking" style="width:min(320px,90%)"></div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="screen-overlay hidden">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🌱</div>
      <div class="result-title" id="result-title">수고했어요!</div>
      <div class="result-score" id="result-score-value">0</div>
      <div class="result-label">점</div>
      <div class="result-stats">
        <div class="stat-item">
          <div class="stat-value" id="stat-weeds">0</div>
          <div class="stat-label">잡초</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-combo">0</div>
          <div class="stat-label">최대콤보</div>
        </div>
        <!-- NOTE: id="stat-miss"는 원래 미스 카운트용이었으나, 현재 최고기록 표시용으로 사용 중 -->
        <div class="stat-item">
          <div class="stat-value" id="stat-miss">0</div>
          <div class="stat-label">최고기록</div>
        </div>
      </div>
      <div id="result-extra"></div>
      <button class="btn-retry" id="btn-retry">다시 하기</button>
    </div>
  </div>

  <div id="countdown" class="hidden"></div>

  <script src="game2.js"></script>

</body>
</html>
