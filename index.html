<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>뽑아라! 잡초 🌿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --toss-blue: #3182F6;
      --toss-red: #F04452;
      --toss-green: #2DC76D;
      --toss-yellow: #FFC34D;
      --toss-bg: #F5F6F8;
      --toss-white: #FFFFFF;
      --toss-black: #191F28;
      --toss-gray50: #F2F4F6;
      --toss-gray100: #E5E8EB;
      --toss-gray300: #B0B8C1;
      --toss-gray500: #8B95A1;
      --toss-gray700: #4E5968;
      --toss-gray900: #191F28;
      --radius: 16px;
    }

    body {
      background: #FFFFFF;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      font-family: 'Jua', 'Toss Product Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    canvas { display: block; }

    /* --- HUD --- */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    .hud-box {
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 8px 16px;
      color: white;
      font-weight: 700;
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.15);
    }
    #hud-score { font-size: 20px; }
    #hud-timer { color: var(--toss-yellow); }
    #hud-combo {
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 900;
      color: var(--toss-yellow);
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.5);
      padding: 6px 20px;
      border-radius: 24px;
      opacity: 0;
      transition: all 0.2s;
    }
    #hud-combo.show {
      opacity: 1;
      animation: comboPop 0.3s ease-out;
    }
    #hud-level {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(8px);
      padding: 6px 16px;
      border-radius: 20px;
      pointer-events: none;
    }
    @keyframes comboPop {
      0% { transform: translateX(-50%) scale(1.5); }
      100% { transform: translateX(-50%) scale(1); }
    }

    /* --- Screens --- */
    .screen-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
      transition: opacity 0.3s;
    }

    #start-screen {
      background: #FFFFFF;
      justify-content: flex-start;
      padding-top: 60px;
    }
    .game-title {
      font-size: 64px;
      margin-bottom: 4px;
      animation: titleBounce 2.5s ease-in-out infinite;
    }
    @keyframes titleBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .game-title-text {
      font-size: 28px;
      font-weight: 900;
      color: var(--toss-black);
      margin-bottom: 24px;
      letter-spacing: 2px;
    }
    /* 플레이 방법 카드 */
    .how-to-play {
      background: var(--toss-gray50);
      border-radius: 20px;
      padding: 20px 24px;
      width: min(320px, 85%);
      margin-bottom: 24px;
    }
    .how-to-play-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--toss-gray700);
      margin-bottom: 12px;
    }
    .how-to-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }
    .how-to-row:not(:last-child) {
      border-bottom: 1px solid var(--toss-gray100);
    }
    .how-to-icon {
      font-size: 24px;
      width: 36px;
      text-align: center;
      flex-shrink: 0;
    }
    .how-to-text {
      font-size: 13px;
      color: var(--toss-gray700);
      line-height: 1.4;
    }
    .how-to-text strong {
      color: var(--toss-black);
    }

    .btn-primary {
      background: var(--toss-blue);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 18px 64px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.1s, background 0.1s;
      letter-spacing: -0.5px;
      box-shadow: 0 6px 20px rgba(49, 130, 246, 0.3), 0 2px 6px rgba(0,0,0,0.08);
    }
    .btn-primary:active {
      transform: scale(0.96);
      background: #1B6AE0;
      box-shadow: 0 2px 8px rgba(49, 130, 246, 0.3);
    }

    /* Result screen */
    #result-screen {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
    }
    .result-card {
      background: var(--toss-white);
      border-radius: 28px;
      padding: 36px 32px;
      text-align: center;
      width: min(85%, 340px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
    }
    .result-emoji { font-size: 64px; margin-bottom: 8px; }
    .result-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--toss-black);
      margin-bottom: 24px;
      letter-spacing: -1px;
    }
    .result-score {
      font-size: 60px;
      font-weight: 900;
      color: var(--toss-blue);
      margin-bottom: 4px;
      letter-spacing: -1px;
      text-shadow: 0 2px 8px rgba(49, 130, 246, 0.15);
    }
    .result-label {
      font-size: 14px;
      color: var(--toss-gray500);
      margin-bottom: 20px;
    }
    .result-stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 28px;
      padding: 16px 0;
      background: #F5F6F8;
      border-radius: 16px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 900;
      color: var(--toss-black);
    }
    .stat-label {
      font-size: 12px;
      color: var(--toss-gray500);
      margin-top: 4px;
    }
    .btn-retry {
      background: var(--toss-blue);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 14px 0;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      pointer-events: auto;
      width: 100%;
      margin-top: 4px;
      transition: transform 0.1s;
      letter-spacing: -0.5px;
      box-shadow: 0 4px 12px rgba(49, 130, 246, 0.3);
    }
    .btn-retry:active { transform: scale(0.97); box-shadow: 0 2px 6px rgba(49, 130, 246, 0.25); }

    /* Feedback */
    .feedback-pop {
      position: absolute;
      pointer-events: none;
      z-index: 15;
      font-weight: 900;
      animation: feedbackUp 0.6s ease-out forwards;
    }
    @keyframes feedbackUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      50% { opacity: 1; transform: translateY(-40px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-70px) scale(0.8); }
    }

    /* Screen shake */
    .shake { animation: shakeAnim 0.15s ease-out; }
    @keyframes shakeAnim {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .hidden { display: none !important; }

    /* Countdown */
    #countdown {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 96px;
      font-weight: 900;
      color: white;
      text-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 25;
      animation: countPop 0.5s ease-out;
    }
    @keyframes countPop {
      0% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* Fever mode glow */
    #fever-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.3s;
      box-shadow: inset 0 0 80px rgba(255, 170, 0, 0.4);
    }
    #fever-overlay.active { opacity: 1; }

    #start-ranking {
      margin-top: 16px;
      background: var(--toss-gray50);
      border-radius: 20px;
      padding: 16px 24px;
      width: min(320px, 85%);
      pointer-events: none;
    }
    .btn-primary {
      width: min(320px, 85%);
      padding: 16px 0;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="fever-overlay"></div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-box">⏱ <span id="hud-timer">30s</span></div>
    <div class="hud-box">⭐ <span id="hud-score">0</span></div>
  </div>
  <div id="hud-combo" class="hidden"></div>
  <div id="hud-level" class="hidden"></div>

  <!-- Start Screen -->
  <div id="start-screen" class="screen-overlay">
    <div class="game-title">🌿</div>
    <div class="game-title-text">뽑아라! 잡초</div>

    <div class="how-to-play">
      <div class="how-to-play-title">플레이 방법</div>
      <div class="how-to-row">
        <div class="how-to-icon">👆</div>
        <div class="how-to-text"><strong>같은 잡초 3개 이상</strong>을 손가락으로 쓱~ 그어서 뽑으세요!</div>
      </div>
      <div class="how-to-row">
        <div class="how-to-icon">🧨</div>
        <div class="how-to-text"><strong>폭탄잡초</strong>가 나타나면 빠르게 3번 연타! 못 막으면 게임 오버!</div>
      </div>
      <div class="how-to-row">
        <div class="how-to-icon">⏱</div>
        <div class="how-to-text">제한시간 <strong>30초!</strong> 많이 그을수록 시간 보너스!</div>
      </div>
    </div>

    <button class="btn-primary" id="btn-start">시작하기</button>
    <div id="start-ranking"></div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="screen-overlay hidden">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🌱</div>
      <div class="result-title" id="result-title">수고했어요!</div>
      <div class="result-score" id="result-score-value">0</div>
      <div class="result-label">점</div>
      <div class="result-stats">
        <div class="stat-item">
          <div class="stat-value" id="stat-weeds">0</div>
          <div class="stat-label">잡초</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-combo">0</div>
          <div class="stat-label">최대콤보</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-miss">0</div>
          <div class="stat-label">최고기록</div>
        </div>
      </div>
      <div id="result-extra"></div>
      <button class="btn-retry" id="btn-retry">다시 하기</button>
    </div>
  </div>

  <div id="countdown" class="hidden"></div>

  <script src="game2.js"></script>

</body>
</html>
